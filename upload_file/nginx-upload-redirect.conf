# ABOUTME: nginx port-80 server block for upload.develle.fr.
# ABOUTME: Redirects plain HTTP to HTTPS, where Caddy serves the upload UI.
#
# The Pi runs nginx on :80 for several *.develle.fr hosts (pruna, studio,
# slides, vjaygent) and Caddy on :443 for upload.develle.fr. nginx has no
# explicit default_server, so an unmatched host on :80 falls through to the
# first server block loaded (alphabetically, pruna.conf) — which is why
# http://upload.develle.fr/ used to show the pruna experiment. This block
# claims the host explicitly and bounces it to HTTPS, where Caddy handles
# basic auth + the WebDAV inbox.
#
# Deploy: sudo install -m 644 -o root -g root nginx-upload-redirect.conf \
#           /etc/nginx/conf.d/upload.conf && sudo nginx -t \
#           && sudo systemctl reload nginx
server {
    listen 80;
    server_name upload.develle.fr;
    return 301 https://$host$request_uri;
}
